<div class="container">
    <h2>Employee Registration</h2>
    <form ng-submit="save()">
        <div class="form-row">
            <!-- Left column -->
             <div class="form-column">
                <div class="form-group">
                    <label>Employee Code</label>
                <input type="text" ng-model="employee.employeeCode" required />
                </div>
                <div class="form-group">
          <label>Employee Name</label>
          <input type="text" ng-model="employee.employeeName" required />
        </div>
         <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" ng-model="employee.dateOfBirth" />
        </div>
        <div class="form-group">
          <label>Joining Date</label>
          <input type="date" ng-model="employee.joiningDate" />
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" ng-model="employee.mobileNumber" />
        </div>
        </div>

        <!-- Right Column -->
      <div class="form-column">
        <div class="form-group">
          <label>Address</label>
          <textarea ng-model="employee.address" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Division</label>
          <select ng-model="employee.division"
                  ng-options="d for d in divisions">
            <option value="">-- Select Division --</option>
          </select>
        </div>
        <div class="form-group">
          <label>District</label>
          <select ng-model="employee.district"
                  ng-options="d for d in districts">
            <option value="">-- Select District --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Religion</label>
          <select ng-model="employee.religion"
                  ng-options="r for r in religions">
            <option value="">-- Select Religion --</option>
          </select>
        </div>
      </div>

        </div>
    </form>
</div>

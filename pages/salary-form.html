<div class="container">
    <h2>Salary Information</h2>
    <form ng-submit="save()">
        <div class="form-group">
            <label>
                Select Employee
            </label>
            <select ng-model="salary.employeeCode" ng-options="e.employeeCode as e.employeename for e in employees">
              <option value="">-- Select Employee --</option>
            </select>
        </div>
        <div class="form-group">
      <label>Designation</label>
      <input type="text" ng-model="salary.designation" required />
    </div>
    <div class="form-group">
      <label>Salary</label>
      <input type="number" ng-model="salary.salary" required />
    </div>
     <div class="form-actions">
      <button type="submit" class="btn-save">Save</button>
      <button type="button" class="btn-clear"
              ng-click="salary={}">Clear</button>
    </div>
    </form>
</div>
